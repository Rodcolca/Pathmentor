<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PathMentor — Tu mentor de carrera en tech</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 700px;
    }
    h1 {
      font-size: 2rem;
      color: #38bdf8;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 32px;
      font-size: 1rem;
    }
    .chat-box {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      min-height: 300px;
      margin-bottom: 16px;
      border: 1px solid #334155;
    }
    .placeholder {
      color: #475569;
      text-align: center;
      margin-top: 100px;
      font-size: 0.9rem;
    }
    .input-area {
      display: flex;
      gap: 10px;
    }
    input[type="text"] {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #38bdf8;
    }
    button {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #7dd3fc; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧭 PathMentor</h1>
    <p class="subtitle">Tu mentor de carrera en tech para latinoamericanos</p>

    <div class="chat-box" id="chat">
      <p class="placeholder">Haz tu primera pregunta sobre carreras en tech 👇</p>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" 
        placeholder="Ej: ¿Cómo entro a tech desde cero en LATAM?" />
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById('userInput');
      const chat = document.getElementById('chat');
      const text = input.value.trim();
      if (!text) return;

      chat.innerHTML += `
        <p style="margin-bottom:12px;">
          <strong style="color:#38bdf8">Tú:</strong> ${text}
        </p>`;
      chat.innerHTML += `
        <p style="margin-bottom:12px;color:#94a3b8">
          <strong>Mentor:</strong> (La IA se conecta mañana ⏳)
        </p>`;

      input.value = '';
      chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
