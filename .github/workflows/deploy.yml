name: Deploy

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build backend
        run: |
          cd server
          npm ci
          npm run build

      - name: Prepare SSH (skip if secrets missing)
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$VPS_HOST" ]; then
            echo "SSH secrets missing (SSH_KEY or VPS_HOST)." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Rsync files to server (requires SSH secrets)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_PATH" ]; then
            echo "Missing VPS secrets (VPS_HOST, VPS_USER, VPS_PATH)." >&2
            exit 1
          fi
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.github' \
            --exclude '.env.local' \
            ./ "$VPS_USER@$VPS_HOST:$VPS_PATH"

      - name: Post-deploy steps (install/build/restart)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" "cd $VPS_PATH && chmod +x scripts/post-deploy.sh && ./scripts/post-deploy.sh"
